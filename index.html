<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Negozio aldo_footlocker</title>

<style>
body{
margin:0;
font-family:Arial;
background:#2a5298;
color:white;
}

header{
text-align:center;
padding:15px;
background:#ff4757;
}

.container{
padding:20px;
max-width:1000px;
margin:auto;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.card{
background:white;
color:black;
border-radius:12px;
overflow:hidden;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
cursor:pointer;
}

.card-body{padding:10px}

.price{color:red;font-weight:bold}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
cursor:pointer;
}

.delete{
background:#e74c3c;
}

.cart{
position:fixed;
top:15px;
left:15px;
background:#e74c3c;
padding:10px;
border-radius:50px;
}

.adminBtn{
position:fixed;
bottom:20px;
right:20px;
background:black;
padding:10px 15px;
border-radius:50px;
cursor:pointer;
}

.overlay{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.overlay img{
max-width:95%;
max-height:90%;
border-radius:10px;
transition:0.3s;
cursor:zoom-in;
}

.box{
background:white;
color:black;
padding:20px;
border-radius:15px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<h2>👟 Negozio aldo_footlocker</h2>
<p>Ordina facilmente su WhatsApp</p>
</header>

<div class="cart">🛒 <span id="count">0</span></div>
<div class="adminBtn" onclick="openAdmin()">🔐 Admin</div>

<div class="container">
<div class="products" id="products"></div>
</div>

<!-- IMAGE VIEW -->
<div class="overlay" id="imgBox" onclick="closeImg()">
<img id="bigImg" onclick="zoomImg(event)">
</div>

<!-- ADMIN PANEL -->
<div class="overlay" id="adminBox">
<div class="box">
<h3>🛠️ Pannello Admin</h3>
<input id="name" placeholder="Nome prodotto">
<input id="price" placeholder="Prezzo">
<input type="file" id="imageFile" accept="image/*">

<button onclick="addProduct()">➕ Aggiungi</button>
<button onclick="closeAdmin()" style="background:red">Chiudi</button>
</div>
</div>

<script>

let cart=[];
let whatsapp="https://wa.me/qr/WHVT75K5O3M2D1?text=";

let products=JSON.parse(localStorage.getItem("products"))||[];

function render(){
let html="";

if(products.length===0){
html="<p style='text-align:center'>🚫 Nessun prodotto disponibile</p>";
}

products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p.image}" onclick="openImg('${p.image}')">
<div class="card-body">
<h3>${p.name}</h3>
<p class="price">${p.price} €</p>

<button onclick="add(${i})">🛒 Aggiungi al carrello</button>
<button class="delete" onclick="del(${i})">🗑 Elimina</button>

<button onclick="window.open('${whatsapp + encodeURIComponent(p.name+' '+p.price)}','_blank')">
📱 Ordina su WhatsApp
</button>

</div>
</div>
`;
});

document.getElementById("products").innerHTML=html;
}

function add(i){
cart.push(products[i]);
document.getElementById("count").innerText=cart.length;
}

function del(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
render();
}

function addProduct(){
let name=document.getElementById("name").value;
let price=document.getElementById("price").value;
let file=document.getElementById("imageFile").files[0];

if(!name||!price||!file){
alert("Compila tutto");
return;
}

let reader=new FileReader();

reader.onload=function(e){
products.push({
name:name,
price:price,
image:e.target.result
});

localStorage.setItem("products",JSON.stringify(products));
render();
closeAdmin();
};

reader.readAsDataURL(file);
}

function openAdmin(){
document.getElementById("adminBox").style.display="flex";
}

function closeAdmin(){
document.getElementById("adminBox").style.display="none";
}

function openImg(src){
document.getElementById("imgBox").style.display="flex";
document.getElementById("bigImg").src=src;
}

function closeImg(){
document.getElementById("imgBox").style.display="none";
}

function zoomImg(e){
let img=e.target;
img.style.transform = img.style.transform==="scale(2)" ? "scale(1)" : "scale(2)";
}

render();

</script>

</body>
</html>
