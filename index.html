<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aldo Shop</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
}

header{
text-align:center;
padding:20px;
background:#ff4757;
}

.container{max-width:1100px;margin:auto;padding:20px}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
color:black;
border-radius:15px;
overflow:hidden;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{padding:15px}

.price{color:red;font-weight:bold}

button{
background:#25D366;
color:white;
border:none;
padding:10px;
width:100%;
margin-top:5px;
border-radius:10px;
cursor:pointer;
}

.admin-btn{
position:fixed;
bottom:20px;
right:20px;
background:black;
padding:10px 15px;
border-radius:50px;
cursor:pointer;
}

.cartBox{
position:fixed;
top:20px;
left:20px;
background:#e74c3c;
padding:10px 15px;
border-radius:50px;
cursor:pointer;
}

.orderBox{
position:fixed;
top:80px;
left:20px;
background:#25D366;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

.overlay{
position:fixed;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:white;
color:black;
padding:20px;
border-radius:15px;
width:300px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<h1>👟 Aldo Shop</h1>
<p>متجر أحذية + طلب واتساب</p>
</header>

<div class="container">
<div class="products" id="products"></div>
</div>

<!-- 🛒 cart -->
<div class="cartBox">🛒 <span id="cartCount">0</span></div>

<!-- 📱 order all -->
<div class="orderBox" onclick="sendOrder()">📱 طلب الكل</div>

<!-- admin button -->
<div class="admin-btn" onclick="openLogin()">🔐 Admin</div>

<!-- login -->
<div class="overlay" id="loginBox">
<div class="box">
<h3>تسجيل الدخول</h3>
<input type="password" id="pass" placeholder="كلمة السر">
<button onclick="login()">دخول</button>
<button onclick="closeLogin()" style="background:red">إغلاق</button>
</div>
</div>

<!-- admin panel -->
<div class="overlay" id="adminBox">
<div class="box">
<h3>🛠️ لوحة التحكم</h3>

<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<input id="image" placeholder="رابط الصورة">

<button onclick="addProduct()">➕ إضافة</button>
<button onclick="logout()" style="background:red">خروج</button>
</div>
</div>

<script>

let PASSWORD = "admin123";

let cart = [];

let products = JSON.parse(localStorage.getItem("products")) || [
{name:"Nike Air Force",price:1200,image:"https://images.unsplash.com/photo-1528701800489-20be9c8a5f3d"},
{name:"Adidas Yeezy",price:1800,image:"https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb"},
{name:"Jordan 1",price:1500,image:"https://images.unsplash.com/photo-1600180758890-6b94519a8ba5"}
];

function render(){
let html="";

products.forEach((p,i)=>{

let msg = `أريد شراء: ${p.name} - السعر: ${p.price} DH`;
let waLink = "https://wa.me/393510798667?text=" + encodeURIComponent(msg);

html += `
<div class="card">
<img src="${p.image}">
<div class="card-body">
<h3>${p.name}</h3>
<p class="price">${p.price} DH</p>

<button onclick="addToCart(${i})">🛒 إضافة للسلة</button>

<button onclick="window.open('${waLink}','_blank')">
📱 طلب مباشر
</button>

</div>
</div>
`;
});

document.getElementById("products").innerHTML = html;
updateCart();
}

/* 🛒 cart */
function addToCart(i){
cart.push(products[i]);
updateCart();
alert("تمت الإضافة 🛒");
}

function updateCart(){
document.getElementById("cartCount").innerText = cart.length;
}

/* 📱 send order all */
function sendOrder(){

if(cart.length === 0){
alert("السلة فارغة ❌");
return;
}

let msg = "🛒 طلب جديد:\n\n";

cart.forEach((p,i)=>{
msg += `${i+1}- ${p.name} - ${p.price} DH\n`;
});

msg += `\n💰 المجموع: ${cart.reduce((a,b)=>a+Number(b.price),0)} DH`;

let url = "https://wa.me/393510798667?text=" + encodeURIComponent(msg);

window.open(url,"_blank");
}

/* 🔐 admin */
function openLogin(){
document.getElementById("loginBox").style.display="flex";
}

function closeLogin(){
document.getElementById("loginBox").style.display="none";
}

function login(){
let p = document.getElementById("pass").value;

if(p === PASSWORD){
document.getElementById("loginBox").style.display="none";
document.getElementById("adminBox").style.display="flex";
}else{
alert("❌ خطأ");
}
}

function logout(){
document.getElementById("adminBox").style.display="none";
}

/* ➕ add product */
function addProduct(){
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let image = document.getElementById("image").value;

products.push({name,price,image});

localStorage.setItem("products", JSON.stringify(products));

render();
alert("تمت الإضافة ✅");
}

render();

</script>

</body>
</html>
