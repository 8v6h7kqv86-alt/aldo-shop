<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚚 DHL Tracking System</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Arial Black', Arial, sans-serif;
  background: linear-gradient(135deg, #ff6b6b, #feca57, #ff9ff3);
  color: #333;
  min-height: 100vh;
  padding: 20px;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  background: rgba(255, 255, 255, 0.95);
  border-radius: 25px;
  padding: 40px;
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
}

.header {
  text-align: center;
  margin-bottom: 40px;
}

.header h1 {
  font-size: 3em;
  background: linear-gradient(45deg, #111, #333);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 10px;
}

.search-box {
  position: relative;
  margin-bottom: 30px;
}

#searchInput {
  width: 100%;
  padding: 25px 60px 25px 25px;
  font-size: 24px;
  font-weight: bold;
  border: 3px solid #ddd;
  border-radius: 20px;
  background: white;
  letter-spacing: 3px;
  text-transform: uppercase;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  transition: all 0.3s;
}

#searchInput:focus {
  outline: none;
  border-color: #ff6b6b;
  box-shadow: 0 15px 40px rgba(255, 107, 107, 0.3);
  transform: scale(1.02);
}

.search-btn {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: linear-gradient(45deg, #ff6b6b, #feca57);
  color: white;
  border: none;
  padding: 15px 20px;
  border-radius: 50px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(255, 107, 107, 0.4);
  transition: all 0.3s;
}

.search-btn:hover {
  transform: translateY(-50%) scale(1.1);
  box-shadow: 0 15px 35px rgba(255, 107, 107, 0.6);
}

.admin-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: linear-gradient(45deg, #111, #333);
  color: #ffcc00;
  border: none;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
  transition: all 0.3s;
  z-index: 1000;
}

.result {
  display: none;
  background: linear-gradient(135deg, #00b894, #00cec9);
  color: white;
  padding: 40px;
  border-radius: 25px;
  margin-top: 30px;
  text-align: center;
}

.tracking-code {
  font-family: 'Courier New', monospace;
  font-size: 36px;
  font-weight: bold;
  letter-spacing: 6px;
  background: rgba(0, 0, 0, 0.3);
  padding: 25px;
  border-radius: 20px;
  margin: 25px 0;
  text-transform: uppercase;
}

.admin-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.9);
  z-index: 2000;
  justify-content: center;
  align-items: center;
}

.admin-panel {
  background: linear-gradient(135deg, #111, #333);
  color: #ffcc00;
  padding: 50px;
  border-radius: 25px;
  max-width: 500px;
  width: 90%;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <h1>🚚 DHL Tracking System</h1>
    <p>Sharm El Sheikh → Italia</p>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="GHL-XXXXXX">
    <button class="search-btn">🔍</button>
  </div>

  <div id="searchResult" class="result"></div>
</div>

<button class="admin-btn">🔐</button>

<script>
let shipments = JSON.parse(localStorage.getItem("dhlShipments")) || [];

function generateTrackingCode() {
  return "GHL-" + Math.floor(100000 + Math.random() * 900000);
}

function searchTracking() {
  const input = document.getElementById("searchInput").value.trim().toUpperCase();
  const result = document.getElementById("searchResult");

  const shipment = shipments.find(s => s.code === input);

  if (!shipment) {
    result.innerHTML = "❌ Tracking Not Found";
    result.style.display = "block";
    return;
  }

  result.innerHTML = `
    <h2>RICEVUTO DI CONSEGNA</h2>
    <div class="tracking-code">${shipment.code}</div>
    <p>${shipment.name}</p>
    <p>${shipment.phone}</p>
    <p>${shipment.address}</p>
  `;

  result.style.display = "block";
}

document.getElementById("searchInput").addEventListener("keypress", function(e){
  if(e.key === "Enter") searchTracking();
});
</script>

</body>
</html>
